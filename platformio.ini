; =============================================================================
; PlatformIO – Waveshare 1.47inch LCD Module
; =============================================================================
; Display   : ST7789V2, 172 × 320 px
; Bibliothek: TFT_eSPI (Bodmer)
; GUI-Tool  : Lopaka  → https://lopaka.app
;
; Alle TFT_eSPI-Einstellungen werden über Build-Flags gesetzt.
; Keine separate User_Setup.h notwendig (-DUSER_SETUP_LOADED).
; =============================================================================

[platformio]
default_envs = esp32wroom32

; ─── Gemeinsame TFT_eSPI-Einstellungen ───────────────────────────────────────
[tft_base]
lib_deps =
    bodmer/TFT_eSPI

build_flags =
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=172
    -DTFT_HEIGHT=320
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=6000000

; ─── ESP32 WROOM 32 ──────────────────────────────────────────────────────────
; Verdrahtung (Waveshare 1.47" → ESP32 WROOM 32):
;
;   Vermiedene Pins: 0 (Boot), 2 (Download), 5 (SDIO), 12 (Flash-V),
;                   15 (UART-Log), 6-11 (interner Flash)
;
;   LCD-Pin │ ESP32-GPIO │ Funktion
;   ────────┼────────────┼─────────────────────
;   VCC     │ 3V3        │ Stromversorgung
;   GND     │ GND        │ Masse
;   DIN     │ GPIO 23    │ SPI MOSI  (VSPI)
;   CLK     │ GPIO 18    │ SPI Clock (VSPI)
;   CS      │ GPIO 17    │ Chip Select        ← sicherer als GPIO 5
;   DC      │ GPIO 27    │ Data / Command     ← sicherer als GPIO 2
;   RST     │ GPIO  4    │ Reset
;   BL      │ GPIO 21    │ Backlight (PWM möglich)
;
[env:esp32wroom32]
platform    = espressif32
board       = esp32dev
framework   = arduino
monitor_speed = 115200

lib_deps    = ${tft_base.lib_deps}
build_flags =
    ${tft_base.build_flags}
    -DTFT_MOSI=23
    -DTFT_SCLK=18
    -DTFT_CS=17
    -DTFT_DC=27
    -DTFT_RST=4
    -DTFT_BL=21

; ─── ESP32-C6 Super Mini ─────────────────────────────────────────────────────
; Verdrahtung (Waveshare 1.47" → ESP32-C6 Super Mini):
;
;   LCD-Pin │ ESP32-C6-GPIO │ Funktion
;   ────────┼───────────────┼─────────────────────
;   VCC     │ 3V3           │ Stromversorgung
;   GND     │ GND           │ Masse
;   DIN     │ GPIO  7       │ SPI MOSI (SPI2/FSPI)
;   CLK     │ GPIO  6       │ SPI Clock (SPI2/FSPI)
;   CS      │ GPIO 10       │ Chip Select
;   DC      │ GPIO  3       │ Data / Command
;   RST     │ GPIO  2       │ Reset
;   BL      │ GPIO  4       │ Backlight (PWM möglich)
;
[env:esp32c6supermini]
; ESP32-C6 benötigt arduino-esp32 v3.x → espressif32 >= 6.x
; TFT_eSPI unterstützt C6 ab Bibliotheksversion ~2.5.43+
platform    = espressif32@^6.10.0
board       = esp32-c6-devkitc-1
framework   = arduino
monitor_speed = 115200
monitor_rts = 0            ; USB-CDC: kein RTS-Reset
monitor_dtr = 0            ; USB-CDC: kein DTR-Reset

lib_deps    = ${tft_base.lib_deps}
build_flags =
    ${tft_base.build_flags}
    -DTFT_MOSI=7
    -DTFT_SCLK=6
    -DTFT_CS=10
    -DTFT_DC=3
    -DTFT_RST=2
    -DTFT_BL=4
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; ─── ESP32-C3 Zero (Waveshare) ───────────────────────────────────────────────
; Verdrahtung (Waveshare 1.47" → ESP32-C3 Zero):
;
;   LCD-Pin │ ESP32-C3-GPIO │ Funktion
;   ────────┼───────────────┼─────────────────────
;   VCC     │ 3V3           │ Stromversorgung
;   GND     │ GND           │ Masse
;   DIN     │ GPIO  7       │ SPI MOSI (SPI2)
;   CLK     │ GPIO  6       │ SPI Clock (SPI2)
;   CS      │ GPIO 10       │ Chip Select
;   DC      │ GPIO  3       │ Data / Command
;   RST     │ GPIO  2       │ Reset
;   BL      │ GPIO  4       │ Backlight (PWM möglich)
;
[env:esp32c3zero]
platform    = espressif32
board       = esp32-c3-devkitm-1
framework   = arduino
monitor_speed = 115200
monitor_rts = 0            ; USB-CDC: kein RTS-Reset
monitor_dtr = 0            ; USB-CDC: kein DTR-Reset

lib_deps    = ${tft_base.lib_deps}
build_flags =
    ${tft_base.build_flags}
    -DTFT_MOSI=7
    -DTFT_SCLK=6
    -DTFT_CS=10
    -DTFT_DC=3
    -DTFT_RST=2
    -DTFT_BL=4
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:rpipico]
platform  = raspberrypi
board     = rpipico
framework = arduino
lib_deps  = ${tft_base.lib_deps}
build_flags =
    ${tft_base.build_flags}
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_CS=17
    -DTFT_DC=20
    -DTFT_RST=21
    -DTFT_BL=22