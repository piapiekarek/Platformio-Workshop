; =============================================================================
; PlatformIO – Waveshare 1.47inch LCD Module
; =============================================================================
; Display : ST7789V2, 172 × 320 px
; Library : TFT_eSPI (Bodmer)
; GUI tool: Lopaka  → https://lopaka.app
;
; All TFT_eSPI settings are set via build flags.
; No separate User_Setup.h needed (-DUSER_SETUP_LOADED).
; =============================================================================

[platformio]
default_envs = rp2350

; ─── Shared TFT_eSPI settings ────────────────────────────────────────────────
[tft_base]
lib_deps =
    bodmer/TFT_eSPI

build_flags =
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_WIDTH=172
    -DTFT_HEIGHT=320
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=6000000

;
; ─── ESP32-C3 Zero (Waveshare) ───────────────────────────────────────────────
; Wiring (Waveshare 1.47" → ESP32-C3 Zero):
;
;   LCD pin │ ESP32-C3 GPIO │ Function
;   ────────┼───────────────┼─────────────────────
;   VCC     │ 3V3           │ Power
;   GND     │ GND           │ Ground
;   DIN     │ GPIO  7       │ SPI MOSI (SPI2)
;   CLK     │ GPIO  6       │ SPI Clock (SPI2)
;   CS      │ GPIO 10       │ Chip Select
;   DC      │ GPIO  3       │ Data / Command
;   RST     │ GPIO  2       │ Reset
;   BL      │ GPIO  4       │ Backlight (PWM possible)
;


[env:rp2350]
platform  = https://github.com/maxgerhardt/platform-raspberrypi.git
board     = rpipico2
framework = arduino
board_build.core = earlephilhower
upload_protocol = picotool
upload_flags =
    -f
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
lib_deps =
    moononournation/GFX Library for Arduino
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    miguelbalboa/MFRC522@^1.4.10
    fastled/FastLED
build_src_filter =
    +<*>
    -<diag_gfx.cpp>
    -<diag_wiki.cpp>
build_flags =
    -DUSE_ARDUINO_GFX
    -DTFT_BACKLIGHT_ON=HIGH
    -DTFT_MOSI=19
    -DTFT_SCLK=18
    -DTFT_MISO=255
    -DTFT_CS=17
    -DTFT_DC=16
    -DTFT_RST=20
    -DTFT_BL=21
    -DRGBIO=22